<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaydarap - Experience</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  
  <style>
    /* 
       Daqiqan hamoon Style haye khodet bedone taghir 
    */
    :root {
      --bg-color: #050507;
      --text-color: #eaeaf0;
      --accent-color: #6bdcff;
      --muted-color: #a3a3ae;
    }

    * { box-sizing: border-box; }
    body, html {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    #stars-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    .top-nav {
      position: fixed; top: 0; left: 0; width: 100%;
      padding: 20px 40px; display: flex;
      justify-content: space-between; align-items: center;
      z-index: 100; pointer-events: none;
    }

    .logo-container {
      display: flex; align-items: center; gap: 15px; pointer-events: auto;
    }

    .planet-logo {
      width: 50px; height: 50px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #8ff1ff 0%, #2a9bff 30%, #0f1a3a 70%, #060810 100%);
      box-shadow: 0 0 20px rgba(107, 220, 255, 0.4);
    }

    .brand-name {
      font-weight: 800; font-size: 1.2rem;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted-color);
    }

    .section {
      position: relative; width: 100%; min-height: 100vh;
      display: flex; justify-content: center; align-items: center;
      z-index: 1;
    }

    /* Page 1: Hero */
    .hero-title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(4rem, 15vw, 12rem);
      color: #fff; text-align: center;
      position: relative; z-index: 2;
    }

    .hero-title::after {
      content: attr(data-text);
      position: absolute; left: 0; top: 0; width: 100%; height: 100%;
      z-index: -1; opacity: 0.8;
      filter: blur(15px);
      animation: glow-cycle 4s infinite alternate;
    }

    @keyframes glow-cycle {
      0% { text-shadow: 0 0 20px #ff0055, 0 0 40px #ff0055; color: #ff0055; }
      33% { text-shadow: 0 0 20px #00ffcc, 0 0 40px #00ffcc; color: #00ffcc; }
      66% { text-shadow: 0 0 20px #2200ff, 0 0 40px #2200ff; color: #2200ff; }
      100% { text-shadow: 0 0 20px #ffaa00, 0 0 40px #ffaa00; color: #ffaa00; }
    }

    /* Page 2: Sphere */
    #sphere-container {
      width: 100%; height: 100vh;
      cursor: grab;
    }

    /* Page 3 (Oon Safe 4 ghabli): Links */
    .links-container {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px; width: 80%; max-width: 1000px;
    }

    .link-card {
      padding: 30px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(107, 220, 255, 0.2);
      border-radius: 20px;
      text-decoration: none; color: white;
      text-align: center; transition: 0.4s;
      backdrop-filter: blur(10px);
    }

    .link-card:hover {
      background: rgba(107, 220, 255, 0.1);
      transform: translateY(-10px);
      border-color: var(--accent-color);
      box-shadow: 0 10px 30px rgba(107, 220, 255, 0.2);
    }

    .rgb-text {
      background: linear-gradient(90deg, #ff0055, #00ffcc, #2200ff, #ffaa00);
      background-size: 300%; -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: rgb-move 5s infinite linear;
      font-weight: 900;
    }

    @keyframes rgb-move {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }
  </style>
</head>
<body>

  <canvas id="stars-canvas"></canvas>

  <div class="top-nav">
    <div class="logo-container">
      <div class="planet-logo"></div>
      <div class="brand-name">KAYDARAP</div>
    </div>
  </div>

  <!-- Page 1 -->
  <section class="section">
    <h1 class="hero-title" data-text="Kaydarap">Kaydarap</h1>
  </section>

  <!-- Page 2 -->
  <section class="section">
    <div id="sphere-container"></div>
  </section>

  <!-- Page 3 (Daqiqan hamon safe 4 ghabli k oomade inja) -->
  <section class="section">
    <div class="links-container">
       <div style="grid-column: 1/-1; text-align: center; margin-bottom: 40px;">
          <h2 class="rgb-text" style="font-size: 3rem;">GET IN TOUCH</h2>
       </div>
       <a href="https://instagram.com/Kaydarap" class="link-card"><h3>Instagram</h3><p>@Kaydarap</p></a>
       <a href="https://t.me/Kaydarap" class="link-card"><h3>Telegram</h3><p>@Kaydarap</p></a>
       <a href="https://wa.me/16025662108" class="link-card"><h3>WhatsApp</h3><p>Message Direct</p></a>
       <a href="mailto:Kaydarap@gmail.com" class="link-card"><h3>Email</h3><p>Kaydarap@gmail.com</p></a>
    </div>
  </section>

  <!-- SCRIPTS - Hameye script haye ghabli bedone dast khordan -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.7.1/gsap.min.js"></script>

  <script>
    // 1. Starfield Script (Bedone dast khordan)
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    
    function initStars() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      stars = [];
      for(let i=0; i<400; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          size: Math.random() * 1.5,
          speed: Math.random() * 0.05,
          opacity: Math.random()
        });
      }
    }

    function animateStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
        ctx.fill();
        s.opacity += s.speed;
        if(s.opacity > 1 || s.opacity < 0) s.speed = -s.speed;
      });
      requestAnimationFrame(animateStars);
    }
    initStars(); animateStars();

    // 2. Sphere Script (Daqiqan hamon logic ghabli)
    const sphereContainer = document.getElementById('sphere-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    sphereContainer.appendChild(renderer.domElement);

    const geometry = new THREE.SphereGeometry(2, 64, 64);
    const material = new THREE.PointsMaterial({
      color: 0x6bdcff,
      size: 0.02,
      transparent: true,
      blending: THREE.AdditiveBlending
    });
    
    const spherePoints = new THREE.Points(geometry, material);
    scene.add(spherePoints);
    camera.position.z = 5;

    function animateSphere() {
      requestAnimationFrame(animateSphere);
      spherePoints.rotation.y += 0.003;
      spherePoints.rotation.x += 0.001;
      renderer.render(scene, camera);
    }
    animateSphere();

    // Resize Handler
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    /* 
       BAKHSH SKULL HAZF SHOD 
       VA HICH KOD DIGE-I DAST NAXORD
    */
  </script>
</body>
</html>
